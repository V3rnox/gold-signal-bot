name: Gold — Analyse horaire

on:
  schedule:
    - cron: '0 * * * *'   # exactement au début de chaque heure
  workflow_dispatch:        # déclenchement manuel pour tester

jobs:
  analyse:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Installer les dépendances
        run: pip install -r telegram_bot/requirements.txt

      - name: Envoyer l'analyse horaire
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM }}
          GEMINI_API_KEY: ${{ secrets.GEMINI }}
          TELEGRAM_CHANNEL: "@btc_signal_confirme_2026"
          ANALYSIS_MODEL: "gemini-2.5-flash-lite"
        run: python telegram_bot/analysis_tick.py
